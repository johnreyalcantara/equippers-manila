<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance — Admin</title>
  <link rel="icon" type="image/x-icon" href="/ico.png">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <nav class="app-nav">
    <a href="/" class="app-nav-brand"><img src="/header.png" alt=""> Admin Panel</a>
    <div class="app-nav-links">
      <a href="/pages/admin/dashboard.html">Dashboard</a>
      <a href="/pages/admin/crm.html">CRM</a>
      <a href="/pages/admin/users.html">Users</a>
      <a href="/pages/admin/attendance.html" class="active">Attendance</a>
      <a href="/pages/admin/donations.html">Donations</a>
      <a href="/pages/admin/photos.html">Photos</a>
      <a class="nav-logout" onclick="API.logout()">Logout</a>
    </div>
  </nav>
  <div class="page">
    <div class="page-header"><h1>Attendance Records</h1></div>
    <div id="filterBar" class="filter-bar"></div>
    <div class="card"><div id="tableContainer">Loading...</div></div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/admin/tables.js"></script>
  <script>
    initAdminTable({
      endpoint: '/admin/attendance',
      containerId: 'tableContainer',
      columns: [
        { key: 'name', label: 'Name' },
        { key: 'username', label: 'Username' },
        { key: 'service_date', label: 'Service Date', render: r => new Date(r.service_date).toLocaleDateString() },
        { key: 'service_time', label: 'Time' },
        { key: 'status', label: 'Status', render: r => `<span class="badge ${r.status==='ATTENDING'?'badge-success':'badge-danger'}">${r.status}</span>` },
        { key: 'marked_at', label: 'Marked At', render: r => new Date(r.marked_at).toLocaleString() }
      ]
    });
  </script>
</body>
</html>
