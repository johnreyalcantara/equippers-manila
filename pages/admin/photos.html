<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photos — Admin</title>
  <link rel="icon" type="image/x-icon" href="/ico.png">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <nav class="app-nav">
    <a href="/" class="app-nav-brand"><img src="/header.png" alt=""> Admin Panel</a>
    <div class="app-nav-links">
      <a href="/pages/admin/dashboard.html">Dashboard</a>
      <a href="/pages/admin/users.html">Users</a>
      <a href="/pages/admin/attendance.html">Attendance</a>
      <a href="/pages/admin/reservations.html">Reservations</a>
      <a href="/pages/admin/donations.html">Donations</a>
      <a href="/pages/admin/photos.html" class="active">Photos</a>
      <a class="nav-logout" onclick="API.logout()">Logout</a>
    </div>
  </nav>
  <div class="page">
    <div class="page-header"><h1>Photo Management</h1></div>

    <!-- Upload Photo -->
    <div class="card">
      <div class="card-title">Upload & Assign Photo</div>
      <div id="uploadAlert"></div>
      <form id="uploadForm" enctype="multipart/form-data" style="display:flex; gap:1rem; flex-wrap:wrap; align-items:end;">
        <div class="form-group" style="margin-bottom:0; min-width:200px;">
          <label>Assign to User</label>
          <select name="user_id" id="userSelect" required>
            <option value="">Loading users...</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0; min-width:220px;">
          <label>Service</label>
          <select name="service_id" id="serviceSelect" required>
            <option value="">Loading services...</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>Photo</label>
          <input type="file" name="photo" accept="image/*" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
      </form>
    </div>

    <!-- Photo Requests -->
    <div class="card">
      <div class="card-title">Photo Requests</div>
      <div id="requestsTable">Loading...</div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/admin/photos.js"></script>
</body>
</html>
