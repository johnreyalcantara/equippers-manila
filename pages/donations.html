<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donations — Equippers Manila</title>
  <link rel="icon" type="image/x-icon" href="/ico.png">
  <link rel="stylesheet" href="/css/common.css">
</head>

<body>
  <nav class="app-nav">
    <a href="/" class="app-nav-brand"><img src="/header.png" alt="" />
      <div class="app-nav-links">
        <a href="/pages/dashboard.html">Dashboard</a>
        <a href="/pages/donations.html" class="active">Donations</a>
        <a href="/pages/photos.html">Photos</a>
        <a href="/pages/settings.html">Settings</a>
        <a class="nav-logout" onclick="API.logout()">Logout</a>
      </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Donations</h1>
      <p>Give via GCash and record your donation</p>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;">
      <!-- Donation Form -->
      <div class="card">
        <div class="card-title">Submit Donation</div>
        <p style="color:var(--gray-600); font-size:0.9rem; margin-bottom:1rem;">
          Scan the GCash QR code, complete the payment, then enter your details below.
        </p>
        <div id="donationAlert"></div>
        <form id="donationForm">
          <div class="form-group">
            <label>Amount (PHP)</label>
            <input type="number" name="amount" placeholder="0.00" min="1" step="0.01" required>
          </div>
          <div class="form-group">
            <label>GCash Reference Number</label>
            <input type="text" name="reference_number" placeholder="e.g. 1234567890" required>
          </div>
          <div class="form-group">
            <label>Message (optional)</label>
            <textarea name="message" rows="3" placeholder="Optional message or note"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit Donation</button>
        </form>
      </div>

      <!-- Donation History -->
      <div class="card">
        <div class="card-title">Your Donation History</div>
        <div id="donationHistory">Loading...</div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/donations.js"></script>
</body>

</html>
