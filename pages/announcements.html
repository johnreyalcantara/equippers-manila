<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — Equippers Manila</title>
  <link rel="icon" type="image/x-icon" href="/ico.png">
  <link rel="stylesheet" href="/css/common.css">
</head>

<body>
  <nav class="app-nav">
    <a href="/" class="app-nav-brand"><img src="/header.png" alt=""></a>
    <div class="app-nav-links" id="navLinks"></div>
  </nav>
  <div class="page">
    <div class="page-header">
      <h1>Announcements & Events</h1>
      <p>Stay updated with what's happening at Equippers Manila</p>
    </div>
    <div id="announcementsList">Loading...</div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    // Build nav based on login state
    const isLoggedIn = !!API.getToken();
    const currentUser = API.getUser();
    const navEl = document.getElementById('navLinks');
    if (isLoggedIn) {
      const isLeader = currentUser && (currentUser.role === 'LEADER' || currentUser.role === 'ADMIN');
      navEl.innerHTML =
        '<a href="/pages/dashboard.html">Dashboard</a>' +
        '<a href="/pages/announcements.html" class="active">Announcements</a>' +
        '<a href="/pages/community.html">Community</a>' +
        '<a href="/pages/chat.html">Chat</a>' +
        '<a href="/pages/donations.html">Donations</a>' +
        (isLeader ? '<a href="/pages/my-groups.html">My Groups</a>' : '') +
        '<a href="/pages/settings.html">Settings</a>' +
        '<a class="nav-logout" onclick="API.logout()">Logout</a>';
    } else {
      navEl.innerHTML =
        '<a href="/pages/announcements.html" class="active">Announcements</a>' +
        '<a href="/pages/community.html">Community</a>' +
        '<a href="/pages/login.html" class="btn btn-nav">LOGIN</a>';
    }

    (async function () {
      try {
        const rows = await fetch('/api/announcements').then(r => r.json());
        const el = document.getElementById('announcementsList');
        if (rows.length === 0) { el.innerHTML = '<p style="color:var(--gray-400)">No announcements yet.</p>'; return; }
        el.innerHTML = rows.map(a => {
          const date = a.event_date ? new Date(a.event_date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : '';
          return `<div class="card">
            ${a.image_url ? '<img src="' + a.image_url + '" style="width:100%;max-height:300px;object-fit:cover;border-radius:12px;margin-bottom:1rem;" alt="">' : ''}
            <h2 style="font-size:1.3rem;color:var(--navy);margin-bottom:0.5rem;">${a.title}</h2>
            ${date ? '<p style="font-size:0.85rem;color:var(--orange);margin-bottom:0.5rem;">' + date + (a.location ? ' — ' + a.location : '') + '</p>' : ''}
            <p style="color:var(--gray-600);line-height:1.7;">${a.description}</p>
            <p style="font-size:0.8rem;color:var(--gray-400);margin-top:0.75rem;">Posted by ${a.author_name} — ${new Date(a.created_at).toLocaleDateString()}</p>
          </div>`;
        }).join('');
      } catch (e) { console.error(e); }
    })();
  </script>
</body>

</html>
