<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Equippers Manila</title>
  <link rel="icon" type="image/x-icon" href="/ico.png">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>

<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <a href="/"><img src="/header.png" alt="Equippers Manila"></a>
    </div>
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join the Equippers Manila community</p>
      <div id="alert" class="auth-alert"></div>
      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" placeholder="Your age" min="1" max="120" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="/pages/login.html">Sign In</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
