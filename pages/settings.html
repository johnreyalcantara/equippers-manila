<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Equippers Manila</title>
  <link rel="icon" type="image/x-icon" href="/ico.png">
  <link rel="stylesheet" href="/css/common.css">
</head>

<body>
  <nav class="app-nav">
    <a href="/" class="app-nav-brand"><img src="/header.png" alt="" />
      <div class="app-nav-links">
        <a href="/pages/dashboard.html">Dashboard</a>
        <a href="/pages/announcements.html">Announcements</a>
        <a href="/pages/community.html">Community</a>
        <a href="/pages/chat.html">Chat</a>
        <a href="/pages/donations.html">Donations</a>
        <a href="/pages/my-groups.html" id="leaderLink" style="display:none;">My Groups</a>
        <a href="/pages/settings.html" class="active">Settings</a>
        <a class="nav-logout" onclick="API.logout()">Logout</a>
      </div>
  </nav>

  <div class="page" style="max-width:600px;">
    <div class="page-header">
      <h1>Account Settings</h1>
      <p>Update your profile information</p>
    </div>

    <div class="card">
      <div id="settingsAlert"></div>
      <form id="settingsForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" id="sName" required>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" id="sAge" min="1" max="120" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" id="sEmail" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" id="sUsername" required>
        </div>
        <div class="form-group">
          <label>New Password (leave blank to keep current)</label>
          <input type="password" name="password" placeholder="Enter new password">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/settings.js"></script>
</body>

</html>
